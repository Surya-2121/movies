<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 200">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f0ad4e"/>
    </linearGradient>
  </defs>

  <!-- Right side: Film reel icon in bordered frame -->
  <g transform="translate(560, 16)">
    <!-- Outer frame -->
    <rect x="0" y="0" width="120" height="150" rx="4" fill="none" stroke="url(#gold)" stroke-width="3"/>
    <!-- Inner frame top extensions -->
    <line x1="30" y1="0" x2="30" y2="-12" stroke="url(#gold)" stroke-width="3"/>
    <line x1="90" y1="0" x2="90" y2="-12" stroke="url(#gold)" stroke-width="3"/>
    <line x1="30" y1="-12" x2="90" y2="-12" stroke="url(#gold)" stroke-width="3"/>

    <!-- Film reel - outer -->
    <circle cx="60" cy="62" r="40" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <!-- Film reel - inner -->
    <circle cx="60" cy="62" r="15" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <!-- Film reel - center -->
    <circle cx="60" cy="62" r="5" fill="url(#gold)"/>
    <!-- Film reel spokes -->
    <line x1="60" y1="22" x2="60" y2="47" stroke="url(#gold)" stroke-width="2"/>
    <line x1="60" y1="77" x2="60" y2="102" stroke="url(#gold)" stroke-width="2"/>
    <line x1="20" y1="62" x2="45" y2="62" stroke="url(#gold)" stroke-width="2"/>
    <line x1="75" y1="62" x2="100" y2="62" stroke="url(#gold)" stroke-width="2"/>
    <line x1="32" y1="34" x2="47" y2="49" stroke="url(#gold)" stroke-width="2"/>
    <line x1="73" y1="75" x2="88" y2="90" stroke="url(#gold)" stroke-width="2"/>
    <line x1="88" y1="34" x2="73" y2="49" stroke="url(#gold)" stroke-width="2"/>
    <line x1="47" y1="75" x2="32" y2="90" stroke="url(#gold)" stroke-width="2"/>

    <!-- Film strip hanging from reel -->
    <path d="M 95,85 Q 105,110 95,130 Q 88,142 80,145" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <!-- Film strip perforations -->
    <rect x="92" y="100" width="4" height="5" rx="1" fill="url(#gold)" opacity="0.6"/>
    <rect x="90" y="110" width="4" height="5" rx="1" fill="url(#gold)" opacity="0.6"/>
    <rect x="87" y="120" width="4" height="5" rx="1" fill="url(#gold)" opacity="0.6"/>
    <rect x="83" y="130" width="4" height="5" rx="1" fill="url(#gold)" opacity="0.6"/>

    <!-- Stars above reel -->
    <polygon points="60,12 62,17 67,17 63,20 64,25 60,22 56,25 57,20 53,17 58,17" fill="url(#gold)" opacity="0.8"/>
    <polygon points="35,20 36,23 39,23 37,25 38,28 35,26 32,28 33,25 31,23 34,23" fill="url(#gold)" opacity="0.5"/>
    <polygon points="85,20 86,23 89,23 87,25 88,28 85,26 82,28 83,25 81,23 84,23" fill="url(#gold)" opacity="0.5"/>
  </g>

  <!-- Main text: GERMANY -->
  <text x="20" y="75" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="72" fill="url(#gold)" letter-spacing="6" font-style="italic">GERMANY</text>

  <!-- TELUGU MOVIES -->
  <text x="20" y="140" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="72" fill="url(#gold)" letter-spacing="2" font-style="italic">TELUGU</text>

  <!-- Thin line separator -->
  <line x1="20" y1="152" x2="530" y2="152" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- MOVIES subtitle -->
  <text x="20" y="178" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="34" fill="#888" letter-spacing="20" font-style="italic">M O V I E S</text>

  <!-- Tagline -->
  <text x="20" y="198" font-family="Arial, sans-serif" font-size="11" fill="#666" letter-spacing="4">YOUR SITE FOR MOVIE NEWS</text>
</svg>
