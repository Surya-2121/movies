<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f0ad4e"/>
    </linearGradient>
  </defs>

  <!-- Clapperboard icon in frame -->
  <g transform="translate(460, 5)">
    <rect x="0" y="0" width="110" height="135" rx="4" fill="none" stroke="url(#gold)" stroke-width="3"/>

    <!-- Clapperboard -->
    <!-- Top clapper part -->
    <polygon points="20,25 90,25 95,45 15,45" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <!-- Diagonal stripes on clapper -->
    <line x1="30" y1="25" x2="25" y2="45" stroke="url(#gold)" stroke-width="2" opacity="0.7"/>
    <line x1="45" y1="25" x2="40" y2="45" stroke="url(#gold)" stroke-width="2" opacity="0.7"/>
    <line x1="60" y1="25" x2="55" y2="45" stroke="url(#gold)" stroke-width="2" opacity="0.7"/>
    <line x1="75" y1="25" x2="70" y2="45" stroke="url(#gold)" stroke-width="2" opacity="0.7"/>
    <!-- Board body -->
    <rect x="15" y="45" width="80" height="55" rx="2" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <!-- Board lines -->
    <line x1="25" y1="58" x2="85" y2="58" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <line x1="25" y1="70" x2="85" y2="70" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>
    <line x1="25" y1="82" x2="85" y2="82" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

    <!-- Stars -->
    <polygon points="55,115 58,122 66,122 60,127 62,134 55,130 48,134 50,127 44,122 52,122" fill="url(#gold)" opacity="0.8"/>
    <polygon points="30,118 31,121 34,121 32,123 33,126 30,124 27,126 28,123 26,121 29,121" fill="url(#gold)" opacity="0.4"/>
    <polygon points="80,118 81,121 84,121 82,123 83,126 80,124 77,126 78,123 76,121 79,121" fill="url(#gold)" opacity="0.4"/>
  </g>

  <!-- GERMANY TELUGU -->
  <text x="15" y="62" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="62" fill="url(#gold)" letter-spacing="4" font-style="italic">GERMANY</text>
  <text x="15" y="118" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="62" fill="url(#gold)" letter-spacing="2" font-style="italic">TELUGU</text>

  <!-- Thin line -->
  <line x1="15" y1="128" x2="440" y2="128" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- MOVIES -->
  <text x="15" y="150" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="26" fill="#888" letter-spacing="16" font-style="italic">M O V I E S</text>
</svg>
