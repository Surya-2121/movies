<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 220">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f0ad4e"/>
    </linearGradient>
  </defs>

  <!-- Film Projector Silhouette -->
  <g transform="translate(300, 12)" fill="url(#gold)">
    <!-- Projector light beam circle -->
    <circle cx="0" cy="28" r="26" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <!-- Projector body -->
    <rect x="-8" y="10" width="16" height="30" rx="2"/>
    <!-- Film reels -->
    <circle cx="-14" cy="18" r="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="-14" cy="18" r="3"/>
    <circle cx="14" cy="18" r="8" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="14" cy="18" r="3"/>
    <!-- Projector lens -->
    <rect x="-3" y="38" width="6" height="8" rx="1"/>
    <!-- Light beam down -->
    <polygon points="-2,46 2,46 8,58 -8,58" opacity="0.4"/>
    <!-- Tripod legs -->
    <line x1="0" y1="46" x2="0" y2="56" stroke="url(#gold)" stroke-width="2"/>
    <line x1="0" y1="52" x2="-12" y2="62" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="0" y1="52" x2="12" y2="62" stroke="url(#gold)" stroke-width="1.5"/>
  </g>

  <!-- Rough/textured horizontal line -->
  <path d="M 30,82 Q 40,79 60,81 Q 80,84 100,80 Q 120,77 140,81 Q 160,84 180,80 Q 200,77 220,81 Q 240,84 260,80 Q 270,78 280,80 Q 290,78 300,80 Q 310,78 320,80 Q 340,84 360,80 Q 380,77 400,81 Q 420,84 440,80 Q 460,77 480,81 Q 500,84 520,80 Q 540,77 560,81 L 570,80" fill="none" stroke="url(#gold)" stroke-width="2"/>

  <!-- Main Title: GERMANY -->
  <text x="300" y="130" text-anchor="middle" font-family="'Cinzel', 'Times New Roman', Georgia, serif" font-weight="900" font-size="52" fill="url(#gold)" letter-spacing="12">GERMANY</text>

  <!-- Subtitle line 1: TELUGU -->
  <text x="300" y="165" text-anchor="middle" font-family="'Cinzel', 'Times New Roman', Georgia, serif" font-weight="700" font-size="30" fill="#ffffff" letter-spacing="18">TELUGU</text>

  <!-- Decorative thin line -->
  <line x1="140" y1="175" x2="460" y2="175" stroke="url(#gold)" stroke-width="1" opacity="0.6"/>

  <!-- Subtitle line 2: MOVIES -->
  <text x="300" y="198" text-anchor="middle" font-family="'Cinzel', 'Times New Roman', Georgia, serif" font-weight="400" font-size="22" fill="#888" letter-spacing="14">M O V I E S</text>

  <!-- Small decorative diamonds -->
  <polygon points="130,175 134,172 138,175 134,178" fill="#f0ad4e" opacity="0.7"/>
  <polygon points="462,175 466,172 470,175 466,178" fill="#f0ad4e" opacity="0.7"/>
</svg>
