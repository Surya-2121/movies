<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 160">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f0ad4e"/>
    </linearGradient>
  </defs>

  <!-- Two film reels symbol -->
  <g transform="translate(470, 10)">
    <!-- Top reel -->
    <circle cx="55" cy="35" r="30" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="55" cy="35" r="10" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="55" cy="35" r="3" fill="url(#gold)"/>
    <!-- Top reel spokes -->
    <line x1="55" y1="5" x2="55" y2="25" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="55" y1="45" x2="55" y2="65" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="25" y1="35" x2="45" y2="35" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="65" y1="35" x2="85" y2="35" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="34" y1="14" x2="44" y2="24" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="66" y1="46" x2="76" y2="56" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="76" y1="14" x2="66" y2="24" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="44" y1="46" x2="34" y2="56" stroke="url(#gold)" stroke-width="1.5"/>
    <!-- Reel teeth outer -->
    <rect x="53" y="3" width="4" height="6" rx="1" fill="url(#gold)"/>
    <rect x="53" y="61" width="4" height="6" rx="1" fill="url(#gold)"/>
    <rect x="23" y="33" width="6" height="4" rx="1" fill="url(#gold)"/>
    <rect x="81" y="33" width="6" height="4" rx="1" fill="url(#gold)"/>

    <!-- Bottom reel (smaller, offset) -->
    <circle cx="55" cy="105" r="25" fill="none" stroke="url(#gold)" stroke-width="2.5"/>
    <circle cx="55" cy="105" r="8" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <circle cx="55" cy="105" r="3" fill="url(#gold)"/>
    <!-- Bottom reel spokes -->
    <line x1="55" y1="80" x2="55" y2="97" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="55" y1="113" x2="55" y2="130" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="30" y1="105" x2="47" y2="105" stroke="url(#gold)" stroke-width="1.5"/>
    <line x1="63" y1="105" x2="80" y2="105" stroke="url(#gold)" stroke-width="1.5"/>
    <!-- Reel teeth -->
    <rect x="53" y="78" width="4" height="5" rx="1" fill="url(#gold)"/>
    <rect x="53" y="128" width="4" height="5" rx="1" fill="url(#gold)"/>
    <rect x="28" y="103" width="5" height="4" rx="1" fill="url(#gold)"/>
    <rect x="78" y="103" width="5" height="4" rx="1" fill="url(#gold)"/>

    <!-- Film strip connecting reels -->
    <path d="M 85,40 Q 100,45 100,70 Q 100,80 80,85" fill="none" stroke="url(#gold)" stroke-width="2"/>
    <!-- Film perforations on strip -->
    <rect x="96" y="50" width="4" height="5" rx="1" fill="url(#gold)" opacity="0.5"/>
    <rect x="98" y="60" width="4" height="5" rx="1" fill="url(#gold)" opacity="0.5"/>
    <rect x="96" y="70" width="4" height="5" rx="1" fill="url(#gold)" opacity="0.5"/>
  </g>

  <!-- GERMANY -->
  <text x="15" y="62" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="62" fill="url(#gold)" letter-spacing="4" font-style="italic">GERMANY</text>
  <!-- TELUGU -->
  <text x="15" y="118" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="62" fill="url(#gold)" letter-spacing="2" font-style="italic">TELUGU</text>

  <!-- Thin line -->
  <line x1="15" y1="128" x2="440" y2="128" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- MOVIES -->
  <text x="15" y="150" font-family="'Cinzel', 'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="26" fill="#888" letter-spacing="16" font-style="italic">M O V I E S</text>
</svg>
