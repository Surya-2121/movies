    <!-- Admin: Add entry (hidden for normal users) -->
    <div id="boAdminSection" style="display:none;">
      <div class="admin-divider"></div>
      <h2 class="admin-title">Add / Edit Box Office Entry</h2>
      <div class="bo-admin-form">
        <select id="boMovieKey" class="login-input">
          <option value="">Select movie...</option>
          <option value="rrr">RRR</option>
          <option value="kalki">Kalki 2898 AD</option>

          <option value="spirit">Spirit</option>

        <input type="text" id="boMovieName" class="login-input" placeholder="Display name (e.g. Ustaad Bhagat Singh)">
        <input type="text" id="boDates" class="login-input" placeholder="Premiere dates (e.g. March 18-23, 2026)">
        <input type="number" id="boAdmissions" class="login-input" placeholder="Total admissions">
        <input type="number" id="boGross" class="login-input" placeholder="Gross revenue (€)">
        <input type="number" id="boShows" class="login-input" placeholder="Number of shows">
        <input type="text" id="boCities" class="login-input" placeholder="Cities (comma separated)">
        <input type="text" id="boPoster" class="login-input" placeholder="Poster URL (optional)">
        <button class="book-btn login-submit-btn" onclick="saveBoxOffice()">Save Entry</button>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-auth.js";
    import { getDatabase, ref, get, set } from "https://www.gstatic.com/firebasejs/11.4.0/firebase-database.js";

    const ADMIN_EMAIL = 'suryasumanth001@gmail.com';

    const firebaseConfig = {
      apiKey: "AIzaSyDmGjpEbIo3YupHpWSc8rgzXWESF5-IPCQ",
      authDomain: "gtm-counter.firebaseapp.com",
      databaseURL: "https://gtm-counter-default-rtdb.europe-west1.firebasedatabase.app",
      projectId: "gtm-counter",
      storageBucket: "gtm-counter.firebasestorage.app",
      messagingSenderId: "424507047798",
      appId: "1:424507047798:web:ab288d3575e67917abc457"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getDatabase(app);

    function esc(str) {
      const d = document.createElement('div');
      d.textContent = str || '';
      return d.innerHTML;
    }

    // Seed data if boxoffice node is empty
    async function seedIfEmpty() {
      const snap = await get(ref(db, 'boxoffice'));
      if (snap.val()) return;
      const seed = {
        rrr: { name: 'RRR', dates: '2022', admissions: 1357, gross: 30290, shows: 0, cities: '', poster: 'https://image.tmdb.org/t/p/w300/u0XUBNQWlOvrh0Gd97ARGpIkL0.jpg' },
        kalki: { name: 'Kalki 2898 AD', dates: '2024', admissions: 1787, gross: 50013, shows: 0, cities: '', poster: 'https://image.tmdb.org/t/p/w300/rstcAnBeCkxNQjNp3YXrF6IP1tW.jpg' },
        og: { name: 'They Call Him OG', dates: '2025', admissions: 2038, gross: 49798, shows: 0, cities: '', poster: '' },
        devara: { name: 'Devara', dates: '2025', admissions: 1333, gross: 28000, shows: 0, cities: '', poster: 'https://image.tmdb.org/t/p/w300/7eO5iuvQjqHmqGwVoq7JPrWoXt6.jpg' },
      };
      for (const [k, v] of Object.entries(seed)) {
        await set(ref(db, 'boxoffice/' + k), { ...v, updatedAt: Date.now() });
      }
    }

    async function loadBoxOffice() {
      await seedIfEmpty();
      const snap = await get(ref(db, 'boxoffice'));
      const data = snap.val() || {};
      const entries = Object.entries(data).map(([key, v]) => ({ key, ...v }));
      entries.sort((a, b) => (b.admissions || 0) - (a.admissions || 0));

      let totalAdmits = 0, totalGross = 0;
      entries.forEach(e => {
        totalAdmits += (e.admissions || 0);
        totalGross += (e.gross || 0);
      });


      const listEl = document.getElementById('boList');
      if (entries.length === 0) {
        listEl.innerHTML = '<p class="bo-empty">No box office data yet. Check back after premiere shows!</p>';
        return;
      }

      const fallbackPosters = {
        ustaad: 'images/poster.jpg',
        rrr: 'https://image.tmdb.org/t/p/w300/u0XUBNQWlOvrh0Gd97ARGpIkL0.jpg',
        kalki: 'https://image.tmdb.org/t/p/w300/rstcAnBeCkxNQjNp3YXrF6IP1tW.jpg',
        devara: 'https://image.tmdb.org/t/p/w300/7eO5iuvQjqHmqGwVoq7JPrWoXt6.jpg',
        og: 'https://image.tmdb.org/t/p/w300/qtOGsZoLW7QceqKmsOy5nSM6Aik.jpg',
      };

      listEl.innerHTML = entries.map((e, i) => {
        const rank = i + 1;
        const cities = e.cities ? e.cities.split(',').map(c => c.trim()).filter(Boolean) : [];
        const poster = e.poster || fallbackPosters[e.key] || '';
        const gross = e.gross ? '€' + (e.gross).toLocaleString() : '—';
        return `<div class="bo-card">
          <div class="bo-rank">#${rank}</div>
          ${poster ? `<img src="${esc(poster)}" alt="${esc(e.name)}" class="bo-poster">` : '<div class="bo-poster-placeholder"></div>'}
          <div class="bo-info">
            <h3 class="bo-movie-name">${esc(e.name)}</h3>
            <div class="bo-dates">${esc(e.dates || '')}</div>
            <div class="bo-admits-row">
              <span class="bo-admits-num">${(e.admissions || 0).toLocaleString()}</span>
              <span class="bo-admits-label">admits</span>
              <span class="bo-gross-small">${gross}</span>
            </div>
            ${cities.length ? `<div class="bo-cities">${cities.map(c => `<span class="bo-city-tag">${esc(c)}</span>`).join('')}</div>` : ''}
          </div>
        </div>`;
      }).join('');
    }

    loadBoxOffice();

    // Admin
    onAuthStateChanged(auth, (user) => {
      if (user && user.email === ADMIN_EMAIL) {
        document.getElementById('boAdminSection').style.display = 'block';
      }
    });

    window.saveBoxOffice = async function() {
      const key = document.getElementById('boMovieKey').value;
      const name = document.getElementById('boMovieName').value.trim();
      const dates = document.getElementById('boDates').value.trim();
      const admissions = parseInt(document.getElementById('boAdmissions').value) || 0;
      const gross = parseInt(document.getElementById('boGross').value) || 0;
      const shows = parseInt(document.getElementById('boShows').value) || 0;
      const cities = document.getElementById('boCities').value.trim();
      const poster = document.getElementById('boPoster').value.trim();
      const msg = document.getElementById('boAdminMsg');

      if (!key || !name) {
        msg.textContent = 'Select a movie and enter a name.'; msg.className = 'review-msg review-msg-err'; return;
      }

      try {
        await set(ref(db, 'boxoffice/' + key), { name, dates, admissions, gross, shows, cities, poster, updatedAt: Date.now() });
        msg.textContent = 'Saved!'; msg.className = 'review-msg review-msg-ok';
        loadBoxOffice();
      } catch (err) {
        msg.textContent = 'Error: ' + err.message; msg.className = 'review-msg review-msg-err';
      }
    };

    // Prefill form when movie selected
    document.getElementById('boMovieKey').addEventListener('change', async function() {
      const key = this.value;
      if (!key) return;
      const snap = await get(ref(db, 'boxoffice/' + key));
      const d = snap.val();
      if (d) {
        document.getElementById('boMovieName').value = d.name || '';
        document.getElementById('boDates').value = d.dates || '';
        document.getElementById('boAdmissions').value = d.admissions || '';
        document.getElementById('boGross').value = d.gross || '';
        document.getElementById('boShows').value = d.shows || '';
        document.getElementById('boCities').value = d.cities || '';
        document.getElementById('boPoster').value = d.poster || '';
      } else {
        const names = { rrr: 'RRR', kalki: 'Kalki 2898 AD', og: 'They Call Him OG', devara: 'Devara', ustaad: 'Ustaad Bhagat Singh', peddi: 'Peddi', paradise: 'The Paradise', vishwambhara: 'Vishwambhara', varanasi: 'Varanasi', spirit: 'Spirit' };
        const posters = { ustaad: 'images/poster.jpg', rrr: 'https://image.tmdb.org/t/p/w300/u0XUBNQWlOvrh0Gd97ARGpIkL0.jpg', kalki: 'https://image.tmdb.org/t/p/w300/rstcAnBeCkxNQjNp3YXrF6IP1tW.jpg', devara: 'https://image.tmdb.org/t/p/w300/7eO5iuvQjqHmqGwVoq7JPrWoXt6.jpg' };
        document.getElementById('boMovieName').value = names[key] || '';
        document.getElementById('boPoster').value = posters[key] || '';
      }
    });
  </script>

</body>
