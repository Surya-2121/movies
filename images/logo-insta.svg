<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 320" width="320" height="320">
  <defs>
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f0ad4e"/>
      <stop offset="50%" style="stop-color:#ffd700"/>
      <stop offset="100%" style="stop-color:#f0ad4e"/>
    </linearGradient>
  </defs>

  <!-- Dark background -->
  <rect width="320" height="320" rx="20" fill="#0f0f1a"/>

  <!-- GERMANY -->
  <text x="160" y="120" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="52" fill="url(#gold)" letter-spacing="3" font-style="italic" text-anchor="middle">GERMANY</text>
  <!-- TELUGU -->
  <text x="160" y="178" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="52" fill="url(#gold)" letter-spacing="2" font-style="italic" text-anchor="middle">TELUGU</text>

  <!-- Thin line -->
  <line x1="40" y1="192" x2="280" y2="192" stroke="url(#gold)" stroke-width="1.5" opacity="0.5"/>

  <!-- MOVIES -->
  <text x="160" y="218" font-family="'Impact', 'Arial Black', sans-serif" font-weight="900" font-size="22" fill="#888" letter-spacing="14" font-style="italic" text-anchor="middle">MOVIES</text>
</svg>
